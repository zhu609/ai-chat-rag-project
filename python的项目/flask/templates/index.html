{% extends "base.html" %}

{% block title %}聊天室{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h5 class="mb-0">💬 公共聊天室</h5>
            </div>
            <div class="card-body">
                <!-- 消息列表区域 -->
                <div id="message-list" class="chat-container mb-3">
                    <!-- 动态加载消息 -->
                </div>
                <!-- 发送消息表单 -->
                <div class="input-group mt-2">
                    <input type="text" id="message-input" class="form-control" placeholder="输入消息..." autocomplete="off">
                    <button id="send-btn" class="btn btn-primary">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 存储当前已显示的消息ID集合，用于去重
    let displayedIds = new Set();
    // 当前最后一条消息的ID（用于增量获取）
    let lastId = 0;

    // 获取并显示所有消息（初次加载）
    function fetchAllMessages() {
        fetch('/messages')
            .then(res => res.json())
            .then(msgs => {
                // 清空显示区域和ID集合
                const container = document.getElementById('message-list');
                container.innerHTML = '';
                displayedIds.clear();
                // 按ID顺序显示
                msgs.sort((a,b) => a.id - b.id);
                msgs.forEach(msg => appendMessage(msg));
                if (msgs.length > 0) {
                    lastId = msgs[msgs.length-1].id;
                }
                // 滚动到底部
                container.scrollTop = container.scrollHeight;
            });
    }

    // 增量获取新消息
    function fetchNewMessages() {
        fetch(`/messages?last_id=${lastId}`)
            .then(res => res.json())
            .then(msgs => {
                if (msgs.length === 0) return;
                msgs.forEach(msg => {
                    if (!displayedIds.has(msg.id)) {
                        appendMessage(msg);
                        displayedIds.add(msg.id);
                    }
                });
                // 更新最后ID
                const newLast = msgs[msgs.length-1].id;
                if (newLast > lastId) lastId = newLast;
                // 自动滚动
                const container = document.getElementById('message-list');
                container.scrollTop = container.scrollHeight;
            });
    }

    // 在页面上添加一条消息
    function appendMessage(msg) {
        const container = document.getElementById('message-list');
        const div = document.createElement('div');
        div.className = 'message-bubble';
        div.innerHTML = `
            <div>
                <span class="message-user">${escapeHtml(msg.user)}</span>
                <span class="message-time ms-2">${msg.time}</span>
            </div>
            <div class="mt-1">${escapeHtml(msg.text)}</div>
        `;
        container.appendChild(div);
    }

    // 简单的防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 发送消息
    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;
        // 禁用按钮，防止重复发送
        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true;
        fetch('/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: text})
        })
        .then(res => {
            if (!res.ok) {
                return res.json().then(err => { throw new Error(err.error || '发送失败'); });
            }
            input.value = '';
            // 发送成功后，立即刷新一次消息列表，保证自己的消息立刻显示
            fetchNewMessages();
        })
        .catch(err => {
            alert('发送失败：' + err.message);
        })
        .finally(() => {
            sendBtn.disabled = false;
            input.focus();
        });
    }

    // 初始化：加载全部消息，开始轮询，绑定发送事件
    document.addEventListener('DOMContentLoaded', () => {
        fetchAllMessages();
        setInterval(fetchNewMessages, 2000); // 每2秒轮询一次
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    });
</script>
{% endblock %}
